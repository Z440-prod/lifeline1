[server]
host = "0.0.0.0"
port = 8443

[database]
url = "postgres://antigravity:password@localhost:5432/lifeline"
max_connections = 20

[auth]
# Replace with your Apple Developer Team ID before deployment.
apple_team_id = "REPLACE_ME"
# Replace with your actual app bundle identifier.
apple_bundle_id = "com.yourcompany.lifeline"
# Nonce validity window (seconds). Shorter = more secure, longer = more forgiving.
nonce_ttl_seconds = 300
# Session token lifetime after successful attestation/assertion.
session_token_ttl_seconds = 3600
# HMAC-SHA256 server secret for signing session tokens.
# MUST be replaced with a cryptographically random string (≥ 32 bytes) in production.
server_secret = "REPLACE_WITH_CRYPTOGRAPHICALLY_RANDOM_SECRET_MIN_32_BYTES"
# "production" or "development" — controls expected AAGUID in attestation.
environment = "development"

[ai]
anthropic_api_url = "https://api.anthropic.com/v1/messages"
# Set via ANTIGRAVITY__AI__ANTHROPIC_API_KEY env var in production.
anthropic_api_key = ""
policy_matrix_version = "1.0.0"

[rate_limit]
# Sustained requests per second allowed per source IP.
requests_per_second = 1
# Maximum burst size — allows short spikes above the sustained rate.
# Effectively allows up to 60 requests per minute with burst tolerance.
burst_size = 60

[integrations]
# Whoop is the only provider requiring server-side OAuth2 (Apple Health and
# Google Health Connect are on-device SDKs the client reads locally — the
# server only records that a device has authorized them).
# Register an app at https://developer.whoop.com to obtain these.
whoop_client_id = ""
whoop_client_secret = ""
whoop_authorize_url = "https://api.prod.whoop.com/oauth/oauth2/auth"
whoop_token_url = "https://api.prod.whoop.com/oauth/oauth2/token"
whoop_api_base = "https://api.prod.whoop.com/developer"
whoop_redirect_uri = "http://localhost:8443/api/v1/integrations/whoop/callback"

[billing]
# Stripe drives all subscription checkout and billing. Leave the secrets empty
# for local development — the billing endpoints then return a simulated
# checkout URL so the upgrade flow can be previewed without real charges.
# Set these via ANTIGRAVITY__BILLING__* env vars in production; never commit
# live keys.
#   ANTIGRAVITY__BILLING__STRIPE_SECRET_KEY=sk_live_...
#   ANTIGRAVITY__BILLING__STRIPE_WEBHOOK_SECRET=whsec_...
stripe_secret_key = ""
stripe_webhook_secret = ""
# Stripe Price ids for the two paid tiers (create them in the Stripe dashboard).
price_pro = "price_1TrvpnV05D55xsPf83oNFGNb"
price_elite = "price_1TrvpyV05D55xsPfbURkZaBD"
# Redirect targets for Stripe Checkout / billing portal. Point these at your
# app's deep links or web return pages in production.
success_url = "http://localhost:8443/billing/success"
cancel_url = "http://localhost:8443/billing/cancel"
portal_return_url = "http://localhost:8443/billing/portal-return"
# Stripe API base — overridable for tests; defaults to the live host.
api_base = "https://api.stripe.com"
# Optional pre-created Stripe Payment Link for donations ("Support Lifeline").
# When empty, POST /billing/donate creates a one-time Checkout Session with
# the caller-chosen amount instead (simulated until Stripe keys are set).
donate_url = "https://donate.stripe.com/test_cNi4gC9Y6aB6eJK0lhcQU00"
apple_shared_secret = ""
apple_verify_url = ""
apple_product_pro = ""
apple_product_elite = ""

